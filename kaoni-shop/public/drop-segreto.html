<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Accesso riservato — Kaoni Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#0a0a0a; --surface:#151515; --surface-2:#1c1c1c; --line:#2a2a2a;
    --text:#f0f0ee; --text-dim:#8a8a86; --red:#e0272e; --red-bright:#ff3b3b; --white:#ffffff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; }
  .mono{ font-family:'JetBrains Mono', monospace; letter-spacing:0.08em; text-transform:uppercase; }

  .gate{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 24px; text-align:center;
  }
  .gate-eyebrow{ font-size:11px; color:var(--red-bright); margin-bottom:18px; }
  .gate-title{
    font-family:'Archivo Black', sans-serif; text-transform:uppercase; font-size:clamp(1.8rem, 6vw, 3rem);
    line-height:1.05; margin-bottom:20px;
  }
  .gate-title span{ color:var(--red-bright); }
  .gate-desc{ color:var(--text-dim); font-size:14px; max-width:380px; margin-bottom:36px; line-height:1.7; }

  .code-form{ display:flex; gap:10px; width:100%; max-width:340px; flex-wrap:wrap; justify-content:center; }
  .code-input{
    flex:1; min-width:180px; background:var(--surface); border:1px solid var(--line); color:var(--text);
    padding:16px; font-size:15px; text-align:center; letter-spacing:0.15em; text-transform:uppercase;
    font-family:'JetBrains Mono', monospace;
  }
  .code-input:focus{ outline:none; border-color:var(--red-bright); }
  .code-submit{
    background:var(--red-bright); color:var(--white); border:1px solid var(--red-bright);
    padding:16px 26px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
  }
  .code-submit:hover{ background:transparent; color:var(--red-bright); }
  .code-error{ color:var(--red-bright); font-size:12px; margin-top:16px; min-height:16px; }
  .back-link{ margin-top:40px; color:var(--text-dim); font-size:12px; text-decoration:underline; }
  .back-link:hover{ color:var(--text); }

  /* ===== Drop content (dopo sblocco) ===== */
  .drop-page{ display:none; padding:60px 24px 100px; max-width:1200px; margin:0 auto; }
  .drop-header{ text-align:center; margin-bottom:60px; }
  .drop-header .gate-eyebrow{ margin-bottom:14px; }
  .drop-header h1{
    font-family:'Archivo Black', sans-serif; text-transform:uppercase; font-size:clamp(2rem, 7vw, 4rem); line-height:1;
  }
  .drop-header h1 span{ color:var(--red-bright); }

  .drop-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:2px; background:var(--line); border:1px solid var(--line); }
  .drop-card{ background:var(--bg); }
  .drop-img-wrap{ aspect-ratio:3/4; background:var(--surface); overflow:hidden; }
  .drop-img-wrap img{ width:100%; height:100%; object-fit:cover; }
  .drop-img-placeholder{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:11px; }
  .drop-info{ padding:18px; }
  .drop-name{ font-family:'Archivo Black', sans-serif; font-size:15px; text-transform:uppercase; margin-bottom:8px; }
  .drop-price{ font-size:14px; font-weight:700; margin-bottom:14px; }
  .drop-add-btn{
    width:100%; background:var(--red-bright); color:var(--white); border:1px solid var(--red-bright);
    padding:10px 14px; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
  }
  .drop-add-btn:hover{ background:transparent; color:var(--red-bright); }
  .drop-empty{ grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-dim); font-size:14px; }

  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface); border:1px solid var(--red-bright); color:var(--text);
    padding:14px 24px; font-size:13px; z-index:600; opacity:0; visibility:hidden; pointer-events:none;
    transition:transform .3s ease, opacity .3s ease, visibility 0s linear .3s;
  }
  .toast.show{
    transform:translateX(-50%) translateY(0); opacity:1; visibility:visible; pointer-events:auto;
    transition:transform .3s ease, opacity .3s ease, visibility 0s linear 0s;
  }
</style>
</head>
<body>

<div class="gate" id="gateView">
  <div class="gate-eyebrow mono">Kaoni Design — Accesso riservato</div>
  <h1 class="gate-title">Sblocca il <span>drop segreto.</span></h1>
  <p class="gate-desc">Questa pagina è visibile solo a chi ha il codice. Se qualcuno te l'ha condiviso, inseriscilo qui sotto.</p>
  <div class="code-form">
    <input type="text" class="code-input" id="codeInput" placeholder="CODICE" autocomplete="off">
    <button class="code-submit" id="codeSubmitBtn">Sblocca</button>
  </div>
  <div class="code-error" id="codeError"></div>
  <a href="/" class="back-link">← Torna al sito</a>
</div>

<div class="drop-page" id="dropPage">
  <div class="drop-header">
    <div class="gate-eyebrow mono">Accesso confermato</div>
    <h1>Drop <span>segreto.</span></h1>
  </div>
  <div class="drop-grid" id="dropGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  // ============================================
  // CODICE DI ACCESSO — cambialo quando vuoi
  // ============================================
  const ACCESS_CODE = 'KAONI2026';

  // Stesse chiavi Supabase del sito principale
  const SUPABASE_URL = 'https://mcwkvozuzpyghihjylte.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_MONvzORVYZ1ri4QY0yt4bg_f4bkoLZN';

  let supabaseClient = null;
  try{
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }catch(e){ console.warn('Supabase non disponibile su questa pagina.'); }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 2600);
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }
  function escapeAttr(str){ return (str||'').replace(/"/g,'&quot;'); }

  async function unlockDrop(){
    document.getElementById('gateView').style.display = 'none';
    document.getElementById('dropPage').style.display = 'block';
    sessionStorage.setItem('kaoni-drop-unlocked', '1');

    const grid = document.getElementById('dropGrid');
    grid.innerHTML = '<div class="drop-empty">Caricamento...</div>';

    if(!supabaseClient){
      grid.innerHTML = '<div class="drop-empty">Errore di connessione. Riprova più tardi.</div>';
      return;
    }

    try{
      const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .eq('is_secret', true)
        .order('created_at', { ascending:false });
      if(error) throw error;

      if(!data || data.length === 0){
        grid.innerHTML = '<div class="drop-empty">Non ci sono ancora pezzi esclusivi disponibili. Torna presto.</div>';
        return;
      }

      grid.innerHTML = '';
      data.forEach(p=>{
        const imgHtml = p.image_url
          ? `<img src="${escapeAttr(p.image_url)}" alt="${escapeAttr(p.title)}">`
          : `<div class="drop-img-placeholder">Nessuna immagine</div>`;
        const card = document.createElement('div');
        card.className = 'drop-card';
        card.innerHTML = `
          <div class="drop-img-wrap">${imgHtml}</div>
          <div class="drop-info">
            <div class="drop-name">${escapeHtml(p.title)}</div>
            <div class="drop-price">€ ${Number(p.price).toFixed(2)}</div>
            <button class="drop-add-btn" data-id="${p.id}">Aggiungi al carrello</button>
          </div>`;
        card.querySelector('.drop-add-btn').addEventListener('click', ()=> addToMainCart(p.id));
        grid.appendChild(card);
      });
    }catch(e){
      console.error(e);
      grid.innerHTML = '<div class="drop-empty">Errore nel caricamento dei prodotti.</div>';
    }
  }

  // Usa lo stesso carrello (localStorage) del sito principale, essendo stesso dominio.
  function addToMainCart(productId){
    const CART_KEY = 'kaoni-cart-v1';
    let cart = {};
    try{ cart = JSON.parse(localStorage.getItem(CART_KEY) || '{}'); }catch(e){}
    cart[productId] = (cart[productId] || 0) + 1;
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    showToast('Aggiunto al carrello — vai al sito principale per completare l\'acquisto.');
  }

  document.getElementById('codeSubmitBtn').addEventListener('click', ()=>{
    const input = document.getElementById('codeInput').value.trim();
    const errorEl = document.getElementById('codeError');
    if(input.toUpperCase() === ACCESS_CODE.toUpperCase()){
      errorEl.textContent = '';
      unlockDrop();
    } else {
      errorEl.textContent = 'Codice non valido.';
    }
  });

  document.getElementById('codeInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') document.getElementById('codeSubmitBtn').click();
  });

  // Se l'utente ha già sbloccato in questa sessione del browser, evitagli di reinserire il codice
  if(sessionStorage.getItem('kaoni-drop-unlocked') === '1'){
    unlockDrop();
  }
})();
</script>

</body>
</html>
