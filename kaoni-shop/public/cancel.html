<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento annullato — Kaoni Design</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{
    margin:0; min-height:100vh; background:#0a0a0a; color:#f0f0ee;
    font-family:'Inter', sans-serif; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:40px;
  }
  .box{ max-width:480px; }
  h1{ font-family:'Archivo Black', sans-serif; text-transform:uppercase; font-size:2.2rem; margin-bottom:20px; }
  h1 span{ color:#ff3b3b; }
  p{ color:#8a8a86; line-height:1.7; margin-bottom:30px; }
  a{ color:#ff3b3b; text-decoration:none; font-weight:600; border:1px solid #ff3b3b; padding:14px 28px; display:inline-block; text-transform:uppercase; font-size:13px; letter-spacing:0.05em; }
  a:hover{ background:#ff3b3b; color:#fff; }
</style>
</head>
<body>
  <div class="box">
    <h1>Pagamento <span>annullato.</span></h1>
    <p>Nessun addebito è stato effettuato. Il tuo carrello è ancora disponibile se vuoi riprovare.</p>
    <a href="/">Torna al sito</a>
  </div>
</body>
</html>
