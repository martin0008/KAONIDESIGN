<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collezione — Kaoni Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="/assets/site.css">
<style>
  .products-section{ padding:160px 40px 120px; max-width:1600px; margin:0 auto; }
  .products-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:44px; gap:20px; flex-wrap:wrap; }
  .products-title{ font-family:'Archivo Black', sans-serif; font-size:clamp(1.8rem, 4vw, 3rem); text-transform:uppercase; line-height:1; color:var(--text); }

  .products-filters{ display:flex; gap:10px; flex-wrap:wrap; }
  .filter-btn{
    background:none; border:1px solid var(--line); color:var(--text-dim);
    font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; padding:9px 16px;
    transition:all .2s ease;
  }
  .filter-btn.active, .filter-btn:hover{ border-color:var(--red-bright); color:var(--red-bright); }

  .products-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:2px; background:var(--line); border:1px solid var(--line); }
  .product-card{ background:var(--bg); position:relative; overflow:hidden; }
  .product-img-wrap{ aspect-ratio:3/4; background:var(--surface); overflow:hidden; position:relative; }
  .product-img-wrap img{ width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
  .product-card:hover .product-img-wrap img{ transform:scale(1.05); }
  .product-img-placeholder{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:11px; text-align:center; padding:20px; }
  .product-info{ padding:18px 18px 22px; }
  .product-cat{ font-size:10px; color:var(--red-bright); margin-bottom:6px; }
  .product-name{ font-family:'Archivo Black', sans-serif; font-size:15px; text-transform:uppercase; margin-bottom:8px; color:var(--text); }
  .product-price{ font-size:14px; font-weight:700; color:var(--text); margin-bottom:12px; }
  .product-add-btn{
    width:100%; background:var(--red-bright); color:var(--white); border:1px solid var(--red-bright);
    padding:10px 14px; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
  }
  .product-add-btn:hover{ background:transparent; color:var(--red-bright); }
  .products-empty{ padding:60px 20px; text-align:center; color:var(--text-dim); font-size:14px; grid-column:1/-1; }

  @media (max-width:900px){
    .products-section{ padding:130px 24px 80px; }
    .products-grid{ grid-template-columns:repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="site-header-slot"></div>

<section class="products-section">
  <div class="products-head">
    <div class="products-title" id="collectionTitle">Collezione</div>
    <div class="products-filters" id="productFilters"></div>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</section>

<div id="site-cart-slot"></div>
<div class="toast" id="toast"></div>

<script src="/assets/site.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  let activeCategoryId = params.get('cat') || 'all';
  let activeSubId = params.get('sub') || null;
  let searchTerm = '';
  let allCategories = [];
  let allProducts = [];

  async function loadCollection(){
    if(!supabaseReady){
      document.getElementById('productsGrid').innerHTML = '<div class="products-empty">Negozio non disponibile al momento.</div>';
      return;
    }
    const [{ data: categories }, { data: products }] = await Promise.all([
      supabaseClient.from('categories').select('*').order('created_at', { ascending:true }),
      supabaseClient.from('products').select('*').eq('is_secret', false).order('created_at', { ascending:false })
    ]);
    allCategories = categories || [];
    allProducts = products || [];
    renderFilters();
    renderTitle();
    renderGrid();
  }

  function renderTitle(){
    const titleEl = document.getElementById('collectionTitle');
    if(activeCategoryId === 'all'){ titleEl.textContent = 'Collezione'; return; }
    const cat = allCategories.find(c=>c.id===activeCategoryId);
    titleEl.textContent = cat ? cat.name : 'Collezione';
  }

  function renderFilters(){
    const wrap = document.getElementById('productFilters');
    wrap.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn' + (activeCategoryId==='all' ? ' active' : '');
    allBtn.textContent = 'Tutti';
    allBtn.onclick = ()=>{ activeCategoryId='all'; activeSubId=null; updateUrl(); renderFilters(); renderTitle(); renderGrid(); };
    wrap.appendChild(allBtn);

    allCategories.forEach(cat=>{
      const b = document.createElement('button');
      b.className = 'filter-btn' + (activeCategoryId===cat.id ? ' active' : '');
      b.textContent = cat.name;
      b.onclick = ()=>{ activeCategoryId=cat.id; activeSubId=null; updateUrl(); renderFilters(); renderTitle(); renderGrid(); };
      wrap.appendChild(b);
    });
  }

  function updateUrl(){
    const url = new URL(window.location);
    if(activeCategoryId === 'all'){ url.searchParams.delete('cat'); } else { url.searchParams.set('cat', activeCategoryId); }
    url.searchParams.delete('sub');
    window.history.replaceState({}, '', url);
  }

  function renderGrid(){
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';

    let list = activeCategoryId==='all' ? allProducts : allProducts.filter(p=>p.category_id===activeCategoryId);
    if(activeSubId){ list = list.filter(p=>p.subcategory_id===activeSubId); }
    if(searchTerm.trim()){
      const term = searchTerm.trim().toLowerCase();
      list = list.filter(p=>p.title.toLowerCase().includes(term));
    }

    if(list.length === 0){
      grid.innerHTML = '<div class="products-empty">Nessun prodotto trovato.<br>Prova con un altro filtro o un\'altra ricerca.</div>';
      return;
    }

    list.forEach(p=>{
      const cat = allCategories.find(c=>c.id===p.category_id);
      const card = document.createElement('div');
      card.className = 'product-card';
      const imgHtml = p.image_url
        ? `<img src="${escapeAttr(p.image_url)}" alt="${escapeAttr(p.title)}" loading="lazy">`
        : `<div class="product-img-placeholder">Nessuna immagine</div>`;
      card.innerHTML = `
        <div class="product-img-wrap">${imgHtml}</div>
        <div class="product-info">
          <div class="product-cat mono">${cat ? escapeHtml(cat.name) : ''}</div>
          <div class="product-name">${escapeHtml(p.title)}</div>
          <div class="product-price">€ ${Number(p.price).toFixed(2)}</div>
          <button class="product-add-btn" data-id="${p.id}">Aggiungi al carrello</button>
        </div>`;
      card.querySelector('.product-add-btn').addEventListener('click', ()=> addToCart(p.id));
      grid.appendChild(card);
    });
  }

  // ===== Barra di ricerca animata (icona -> input) =====
  function setupSearch(){
    const wrap = document.getElementById('searchWrap');
    const toggleBtn = document.getElementById('searchToggleBtn');
    const input = document.getElementById('searchInput');
    if(!wrap || !toggleBtn || !input) return;

    toggleBtn.addEventListener('click', ()=>{
      const isOpen = wrap.classList.contains('open');
      if(!isOpen){
        wrap.classList.add('open');
        setTimeout(()=> input.focus(), 350);
      } else if(input.value.trim() === ''){
        wrap.classList.remove('open');
      } else {
        input.focus();
      }
    });

    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Escape'){ input.value=''; searchTerm=''; renderGrid(); wrap.classList.remove('open'); }
    });

    input.addEventListener('input', (e)=>{
      searchTerm = e.target.value;
      renderGrid();
    });

    document.addEventListener('click', (e)=>{
      if(!wrap.contains(e.target) && input.value.trim() === ''){
        wrap.classList.remove('open');
      }
    });
  }

  (async function(){
    await initSharedUI();
    setupSearch();
    await loadCollection();
  })();
</script>

</body>
</html>
