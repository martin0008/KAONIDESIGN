<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-header">
    <h2>Il tuo carrello</h2>
    <button id="cartCloseBtn" class="cart-close-btn" aria-label="Chiudi carrello">✕</button>
  </div>
  <div class="cart-items" id="cartItemsWrap"></div>
  <div class="cart-footer">
    <div class="cart-subtotal-row">
      <span>Subtotale</span>
      <span id="cartSubtotal">€ 0.00</span>
    </div>
    <button class="save-btn cart-checkout-btn" id="checkoutBtn">Vai al pagamento</button>
    <div class="cart-error" id="cartError"></div>
  </div>
</div>
